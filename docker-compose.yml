version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ehr_sync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ehr_user
      POSTGRES_PASSWORD: ehr_password
      POSTGRES_DB: ehr_sync_db
    ports:
      # Maps to 5433 to avoid conflict with any existing local Postgres on 5432
      - '5433:5432'
    volumes:
      - ehr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ehr_user -d ehr_sync_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ehr_postgres_data:
    driver: local
